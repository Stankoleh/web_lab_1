<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="login-page">
<!-- login form -->
<section class="login-card">
    <h2>sign in</h2>
    <div class="form-field"><label for="username">username</label><input id="username" class="form-field__input" type="text" placeholder="admin"></div>
    <div class="form-field"><label for="password">password</label><input id="password" class="form-field__input" type="password" placeholder="••••••••"></div>
    <p class="validation-error">password must contain at least 6 characters</p>
    <button class="button" type="button">login</button>
</section>
</body>
</html>
